<!DOCTYPE html> <!-- Tells the browser what version of HTML we are using -->
<html lang = 'en'> <!-- root element of the document. Making every descendant a descendant of html-->
<!-- the lang attribute helps assistive tech for people with disabilities for example and invoke correct pronounciation-->
<head> <!-- This element is where we put metadata about our browser and we should not put elements that should appear on the webpage here-->
<!-- head element should always be beneath the html tag as its first descendant-->
 <meta charset = 'utf-8'> <!-- this ensures the webpage will correctly symbols and characters from different languages-->
<title>My First Webpage</title> <!-- The title shows in the tab of the browser and tells assistive text with the title is-->
<body> <!-- this is where we put the content to be displayed on our webpage-->

    <h1>Hello World!</h1> <!-- -->

</body>

</title>

</head>

</html> <!-- closing html tag -->
